    <circle cx="142" cy="118" r="6" fill="#2563eb" stroke="none"/>
  </g>
  <text x="160" y="166" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#64748b" font-weight="500">No photo yet</text>
</svg>
